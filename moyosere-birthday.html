<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>For Moyosere 🐝</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.4/babel.min.js"></script>
<style>
  :root{
    --night-1:#0b0713;
    --night-2:#160f28;
    --gold:#f0b429;
    --gold-lite:#f9dd7a;
    --gold-deep:#b8860b;
    --magic:#b14aff;
    --magic-2:#5ad1ff;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#000;}
  #root{height:100%;}
  .stage{
    position:relative;height:100dvh;width:100vw;overflow:hidden;
    font-family:'Fredoka',system-ui,sans-serif;
    background:
      radial-gradient(120% 90% at 50% 18%, #241640 0%, var(--night-2) 42%, var(--night-1) 100%);
    display:flex;align-items:center;justify-content:center;
    transition:background .6s ease;
  }
  .stage.shake{animation:screenShake .5s cubic-bezier(.36,.07,.19,.97);}
  @keyframes screenShake{
    10%,90%{transform:translate(-2px,1px)}
    20%,80%{transform:translate(4px,-2px)}
    30%,50%,70%{transform:translate(-7px,3px)}
    40%,60%{transform:translate(7px,-3px)}
  }

  .sky{position:absolute;inset:0;pointer-events:none;}
  .star{position:absolute;width:3px;height:3px;border-radius:50%;background:#fff;opacity:.5;
    animation:twinkle var(--tw,3s) ease-in-out infinite;box-shadow:0 0 6px #fff;}
  @keyframes twinkle{0%,100%{opacity:.15;transform:scale(.6)}50%{opacity:.9;transform:scale(1.1)}}

  .floorglow{
    position:absolute;left:50%;top:62%;width:min(78vw,420px);height:120px;transform:translateX(-50%);
    background:radial-gradient(50% 50% at 50% 50%, rgba(240,180,41,.55), rgba(240,180,41,0) 70%);
    filter:blur(6px);pointer-events:none;transition:opacity .4s;
  }

  .center{position:relative;display:flex;flex-direction:column;align-items:center;z-index:5;padding:0 18px;}

  .bubble-wrap{position:relative;margin-bottom:14px;min-height:10px;display:flex;flex-direction:column;align-items:center;}
  .bubble{
    position:relative;background:#fdfdfd;color:#1a1030;border-radius:26px;
    padding:16px 22px 18px;max-width:320px;text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.45), inset 0 0 0 3px rgba(0,0,0,.05);
    animation:bubblePop .35s cubic-bezier(.34,1.56,.64,1) both;
  }
  .bubble.angry{background:#ffe1e1;color:#8a0016;box-shadow:0 10px 30px rgba(180,0,20,.4);animation:bubblePop .2s ease both, jiggle .3s ease;}
  @keyframes bubblePop{0%{transform:scale(.4);opacity:0}100%{transform:scale(1);opacity:1}}
  @keyframes jiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-3deg)}75%{transform:rotate(3deg)}}
  .bubble .q{font-family:'Bangers',cursive;letter-spacing:1.5px;font-size:26px;line-height:1;}
  .bubble.angry .q{font-size:30px;}
  .bubble::after,.bubble::before{content:"";position:absolute;left:50%;background:inherit;border-radius:50%;}
  .bubble::after{width:22px;height:22px;bottom:-24px;transform:translateX(-24px);box-shadow:inherit;}
  .bubble::before{width:12px;height:12px;bottom:-40px;transform:translateX(-8px);box-shadow:inherit;}

  .options{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:26px;width:min(90vw,360px);
    animation:fadeUp .5s .15s both;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
  .opt{
    appearance:none;border:none;cursor:pointer;font-family:'Fredoka',sans-serif;font-weight:600;
    font-size:16px;padding:15px 10px;border-radius:16px;color:#3a2600;
    background:linear-gradient(180deg,var(--gold-lite),var(--gold));
    box-shadow:0 5px 0 var(--gold-deep), 0 8px 18px rgba(0,0,0,.35);
    transition:transform .08s ease, box-shadow .08s ease, filter .2s;
  }
  .opt:hover{filter:brightness(1.05);}
  .opt:active{transform:translateY(4px);box-shadow:0 1px 0 var(--gold-deep),0 4px 10px rgba(0,0,0,.35);}
  .opt:focus-visible{outline:3px solid var(--magic-2);outline-offset:3px;}
  .opt.dud{background:linear-gradient(180deg,#e8e2f0,#c9bfe0);box-shadow:0 5px 0 #8a7fb0,0 8px 18px rgba(0,0,0,.3);color:#332a4a;}

  .hint{margin-top:22px;font-size:15px;color:var(--gold-lite);letter-spacing:.5px;opacity:.85;
    animation:hintPulse 1.8s ease-in-out infinite;}
  @keyframes hintPulse{0%,100%{opacity:.45;transform:translateY(0)}50%{opacity:1;transform:translateY(-3px)}}

  .chest-btn{background:none;border:none;padding:0;cursor:pointer;display:block;}
  .chest-btn:focus-visible{outline:3px solid var(--magic-2);outline-offset:8px;border-radius:16px;}
  .chest{width:min(58vw,240px);height:auto;display:block;filter:drop-shadow(0 18px 22px rgba(0,0,0,.55));}
  .chest-anim-bob{animation:bob 3.4s ease-in-out infinite;}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-10px) rotate(-1deg)}}
  .chest-anim-rattle{animation:rattle .4s ease;}
  @keyframes rattle{0%,100%{transform:translate(0,0) rotate(0)}20%{transform:translate(-5px,0) rotate(-4deg)}40%{transform:translate(5px,0) rotate(4deg)}60%{transform:translate(-4px,0) rotate(-3deg)}80%{transform:translate(4px,0) rotate(3deg)}}
  .chest-anim-charge{animation:violent .12s linear infinite;}
  @keyframes violent{0%{transform:translate(-3px,1px) rotate(-2deg) scale(1.02)}25%{transform:translate(3px,-2px) rotate(2deg) scale(1.04)}50%{transform:translate(-4px,2px) rotate(-3deg) scale(1.03)}75%{transform:translate(4px,-1px) rotate(2deg) scale(1.05)}100%{transform:translate(-2px,1px) rotate(-1deg) scale(1.02)}}

  .flash{position:absolute;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:60;}
  .flash.go{animation:flash .55s ease-out forwards;}
  @keyframes flash{0%{opacity:0}8%{opacity:1}100%{opacity:0}}

  #confetti{position:fixed;inset:0;z-index:40;pointer-events:none;}

  .celebrate{position:fixed;inset:0;z-index:20;opacity:0;
    background-size:cover;background-position:center;background-repeat:no-repeat;background-color:#000;
    display:flex;flex-direction:column;justify-content:flex-end;align-items:center;
    transition:opacity .9s ease;overflow:hidden;}
  .celebrate.show{opacity:1;}

  .balloon{position:absolute;bottom:-150px;border:none;background:none;padding:0;margin:0;
    cursor:pointer;pointer-events:auto;z-index:4;animation:floatUp linear forwards;
    filter:drop-shadow(0 6px 8px rgba(0,0,0,.4));transition:transform .05s;-webkit-tap-highlight-color:transparent;}
  .balloon:active{transform:scale(.9);}
  .balloon:focus-visible{outline:3px solid #fff;outline-offset:2px;border-radius:50%;}
  @keyframes floatUp{0%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-55vh) rotate(4deg)}100%{transform:translateY(-120vh) rotate(-4deg)}}

  .hud{position:absolute;top:calc(env(safe-area-inset-top,0px) + 14px);left:0;right:0;z-index:6;
    display:flex;justify-content:space-between;padding:0 16px;pointer-events:none;
    font-family:'Fredoka',sans-serif;font-weight:700;}
  .hud .pill{background:rgba(0,0,0,.5);color:#fff;padding:7px 15px;border-radius:999px;
    backdrop-filter:blur(5px);font-size:15px;letter-spacing:.3px;border:1px solid rgba(255,255,255,.16);}
  .hud .pill b{color:#ffd23f;font-weight:700;}
  .newhigh{position:absolute;top:calc(env(safe-area-inset-top,0px) + 56px);left:50%;transform:translateX(-50%);
    z-index:6;font-family:'Bangers',cursive;font-size:26px;letter-spacing:1px;color:#ffd23f;pointer-events:none;
    text-shadow:0 2px 0 #b8860b, 0 0 18px rgba(255,210,63,.7);
    animation:pop .4s both, hiPulse .9s ease-in-out infinite .4s;white-space:nowrap;}
  @keyframes hiPulse{0%,100%{transform:translateX(-50%) scale(1)}50%{transform:translateX(-50%) scale(1.1)}}
  .gamehint{position:absolute;top:calc(env(safe-area-inset-top,0px) + 92px);left:50%;transform:translateX(-50%);
    z-index:6;font-family:'Fredoka';font-weight:500;font-size:13px;color:rgba(255,255,255,.75);pointer-events:none;
    background:rgba(0,0,0,.35);padding:4px 12px;border-radius:999px;white-space:nowrap;animation:hintPulse 2s ease-in-out infinite;}

  .scold{position:absolute;inset:0;z-index:8;display:flex;align-items:center;justify-content:center;
    pointer-events:none;padding:22px;text-align:center;
    background:radial-gradient(circle at 50% 45%, rgba(190,0,24,.42), rgba(120,0,12,.18) 55%, transparent 78%);
    animation:scoldFade .15s ease both;}
  .scold span{font-family:'Bangers',cursive;font-size:clamp(38px,12vw,80px);line-height:.92;color:#ff2b2b;
    text-shadow:0 3px 0 #6a0010, 0 0 26px rgba(255,40,40,.7);animation:scoldShake .38s ease-in-out infinite;}
  @keyframes scoldFade{from{opacity:0}to{opacity:1}}
  @keyframes scoldShake{0%,100%{transform:translate(0,0) rotate(-1.5deg) scale(1)}
    25%{transform:translate(-7px,3px) rotate(1.5deg) scale(1.03)}
    50%{transform:translate(7px,-3px) rotate(-2deg) scale(1)}
    75%{transform:translate(-5px,-2px) rotate(1deg) scale(1.03)}}

  .festive{position:relative;z-index:7;width:100%;display:flex;flex-direction:column;align-items:center;
    padding:0 16px calc(env(safe-area-inset-bottom,0px) + 26px);}
  .hb{font-family:'Bangers',cursive;text-align:center;line-height:.92;
    text-shadow:0 3px 0 rgba(0,0,0,.55), 0 0 22px rgba(240,180,41,.35);}
  .hb .l1{display:block;font-size:clamp(30px,9vw,52px);color:#fff;letter-spacing:2px;
    animation:pop .5s .2s cubic-bezier(.34,1.56,.64,1) both;}
  .hb .l2{display:block;font-size:clamp(44px,15vw,92px);letter-spacing:2px;
    background:linear-gradient(180deg,#fff4c2,var(--gold) 55%,#e08b00);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    animation:pop .5s .38s cubic-bezier(.34,1.56,.64,1) both;}
  @keyframes pop{0%{transform:scale(.3) rotate(-6deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}
  .tag{margin-top:10px;font-family:'Fredoka';font-weight:600;color:#fff;font-size:clamp(14px,4vw,18px);
    background:rgba(0,0,0,.4);padding:7px 16px;border-radius:999px;backdrop-filter:blur(3px);
    animation:pop .5s .6s cubic-bezier(.34,1.56,.64,1) both;text-align:center;}

  .cake{width:clamp(120px,34vw,170px);margin:18px 0 4px;animation:cakeBob 2.6s ease-in-out infinite;
    filter:drop-shadow(0 10px 14px rgba(0,0,0,.5));}
  @keyframes cakeBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  .flame{transform-origin:center bottom;animation:flick .28s ease-in-out infinite alternate;}
  .flame.b{animation-delay:.1s}.flame.c{animation-delay:.18s}
  @keyframes flick{from{transform:scaleY(.86) scaleX(1.05)}to{transform:scaleY(1.12) scaleX(.92)}}

  .replay{margin-top:18px;appearance:none;cursor:pointer;font-family:'Fredoka';font-weight:600;
    font-size:14px;color:#fff;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.3);
    padding:9px 18px;border-radius:999px;backdrop-filter:blur(4px);animation:pop .5s .9s both;}
  .replay:active{transform:scale(.95);}

  @media (prefers-reduced-motion: reduce){
    .chest-anim-bob,.chest-anim-charge,.balloon,.cake,.flame,.hint{animation:none!important;}
  }
</style>
</head>

  const charge = ()=>{const c=ctx();const t=c.currentTime;const o=c.createOscillator();o.type="sawtooth";o.frequency.setValueAtTime(90,t);o.frequency.exponentialRampToValueAtTime(900,t+1.5);const g=c.createGain();g.gain.setValueAtTime(0.0001,t);g.gain.linearRampToValueAtTime(0.16,t+1.2);g.gain.linearRampToValueAtTime(0.22,t+1.5);const lfo=c.createOscillator();lfo.frequency.setValueAtTime(8,t);lfo.frequency.exponentialRampToValueAtTime(40,t+1.5);const lg=c.createGain();lg.gain.value=0.08;lfo.connect(lg).connect(g.gain);o.connect(g).connect(c.destination);o.start(t);lfo.start(t);o.stop(t+1.55);lfo.stop(t+1.55);};

  const boom = ()=>{const c=ctx();const t=c.currentTime;
    const s=c.createBufferSource();s.buffer=noise(c,0.9);const lp=c.createBiquadFilter();lp.type="lowpass";lp.frequency.setValueAtTime(3800,t);lp.frequency.exponentialRampToValueAtTime(200,t+0.6);const g=c.createGain();g.gain.setValueAtTime(0.6,t);g.gain.exponentialRampToValueAtTime(0.0001,t+0.85);s.connect(lp).connect(g).connect(c.destination);s.start(t);s.stop(t+0.9);
    const o=c.createOscillator();o.type="sine";o.frequency.setValueAtTime(120,t);o.frequency.exponentialRampToValueAtTime(35,t+0.5);const og=c.createGain();og.gain.setValueAtTime(0.5,t);og.gain.exponentialRampToValueAtTime(0.0001,t+0.6);o.connect(og).connect(c.destination);o.start(t);o.stop(t+0.6);};

  const fanfare = ()=>{const c=ctx();const notes=[523.25,659.25,783.99,1046.5,1318.5];notes.forEach((f,i)=>{const t=c.currentTime+0.35+i*0.12;const o=c.createOscillator();o.type="triangle";o.frequency.value=f;const g=c.createGain();g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(0.2,t+0.02);g.gain.exponentialRampToValueAtTime(0.0001,t+0.45);o.connect(g).connect(c.destination);o.start(t);o.stop(t+0.5);});};

  const pop = ()=>{const c=ctx();const t=c.currentTime;
    const o=c.createOscillator();o.type="sine";o.frequency.setValueAtTime(760,t);o.frequency.exponentialRampToValueAtTime(170,t+0.12);const g=c.createGain();g.gain.setValueAtTime(0.3,t);g.gain.exponentialRampToValueAtTime(0.0001,t+0.13);o.connect(g).connect(c.destination);o.start(t);o.stop(t+0.14);
    const s=c.createBufferSource();s.buffer=noise(c,0.03);const g2=c.createGain();g2.gain.setValueAtTime(0.22,t);g2.gain.exponentialRampToValueAtTime(0.0001,t+0.03);s.connect(g2).connect(c.destination);s.start(t);s.stop(t+0.03);};

  const ding = ()=>{const c=ctx();[880,1320].forEach((f,i)=>{const t=c.currentTime+i*0.09;const o=c.createOscillator();o.type="triangle";o.frequency.value=f;const g=c.createGain();g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(0.22,t+0.02);g.gain.exponentialRampToValueAtTime(0.0001,t+0.4);o.connect(g).connect(c.destination);o.start(t);o.stop(t+0.42);});};

  const angryBlast = ()=>{const c=ctx();const t=c.currentTime;
    [108,112].forEach(f=>{const o=c.createOscillator();o.type="sawtooth";o.frequency.setValueAtTime(f,t);o.frequency.linearRampToValueAtTime(f*0.66,t+0.5);const g=c.createGain();g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(0.26,t+0.02);g.gain.setValueAtTime(0.26,t+0.34);g.gain.exponentialRampToValueAtTime(0.0001,t+0.55);o.connect(g).connect(c.destination);o.start(t);o.stop(t+0.56);});
    const o2=c.createOscillator();o2.type="square";o2.frequency.setValueAtTime(220,t);o2.frequency.exponentialRampToValueAtTime(90,t+0.5);const g3=c.createGain();g3.gain.setValueAtTime(0.14,t);g3.gain.exponentialRampToValueAtTime(0.0001,t+0.5);o2.connect(g3).connect(c.destination);o2.start(t);o2.stop(t+0.52);
    const s=c.createBufferSource();s.buffer=noise(c,0.4);const hp=c.createBiquadFilter();hp.type="highpass";hp.frequency.value=1800;const g2=c.createGain();g2.gain.setValueAtTime(0.3,t);g2.gain.exponentialRampToValueAtTime(0.0001,t+0.4);s.connect(hp).connect(g2).connect(c.destination);s.start(t);s.stop(t+0.4);};

  return {rattle,wrong,charge,boom,fanfare,pop,ding,angryBlast,unlock:()=>ctx()};
}

function useConfetti(){
  const cvs=useRef(null),parts=useRef([]),raf=useRef(0),raining=useRef(false);
  const COLORS=["#f0b429","#ff4d6d","#5ad1ff","#b14aff","#7ed957","#ffd23f","#ffffff"];
  const mk=(x,y,vx,vy)=>({x,y,vx,vy,rot:Math.random()*6,vrot:(Math.random()-0.5)*0.3,s:Math.random()*8+5,c:COLORS[Math.floor(Math.random()*COLORS.length)],sq:Math.random()>0.4,life:9999});
  useEffect(()=>{
    const c=cvs.current;if(!c)return;const x=c.getContext("2d");
    const fit=()=>{c.width=innerWidth*devicePixelRatio;c.height=innerHeight*devicePixelRatio;x.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);};
    fit();addEventListener("resize",fit);
    const loop=()=>{
      x.clearRect(0,0,innerWidth,innerHeight);
      if(raining.current&&Math.random()<0.8){for(let i=0;i<3;i++)parts.current.push(mk(Math.random()*innerWidth,-20,(Math.random()-0.5)*2,Math.random()*2+1));}
      parts.current.forEach(p=>{
        p.vy+=0.06;p.x+=p.vx;p.y+=p.vy;p.rot+=p.vrot;p.life--;
        x.save();x.translate(p.x,p.y);x.rotate(p.rot);x.globalAlpha=Math.max(0,Math.min(1,p.life/20));x.fillStyle=p.c;
        if(p.sq)x.fillRect(-p.s/2,-p.s/2,p.s,p.s*0.6);else{x.beginPath();x.arc(0,0,p.s/2,0,7);x.fill();}
        x.restore();
      });
      parts.current=parts.current.filter(p=>p.y<innerHeight+40&&p.life>0);
      raf.current=requestAnimationFrame(loop);
    };
    loop();
    return()=>{cancelAnimationFrame(raf.current);removeEventListener("resize",fit);};
  },[]);
  const burst=(cx,cy,count=220)=>{const big=count>60;for(let i=0;i<count;i++){const a=Math.random()*Math.PI*2,sp=Math.random()*(big?13:7)+2;const p=mk(cx,cy,Math.cos(a)*sp,Math.sin(a)*sp-(big?4:2));p.life=(big?90:50)+Math.random()*40;parts.current.push(p);}};
  const rain=(on)=>{raining.current=on;};
  return {cvs,burst,rain};
}

      <rect x="34" y="72" width="132" height="30" rx="14" fill="#fff0f5"/>

const OPTIONS=[
  {t:"Daddy's favourite",ok:true},
  {t:"Nobody",ok:false},
  {t:"Somebody",ok:false},
  {t:"Anybody",ok:false},
];

function App(){
  const [phase,setPhase]=useState("intro");
  const [rattling,setRattling]=useState(false);
  const [angry,setAngry]=useState(false);
  const [flash,setFlash]=useState(false);
  const [shake,setShake]=useState(false);
  const [glow,setGlow]=useState(0);
  const [score,setScore]=useState(0);
  const [highScore,setHighScore]=useState(0);
  const [newHigh,setNewHigh]=useState(false);
  const [balloons,setBalloons]=useState([]);
  const [scold,setScold]=useState(false);
  const sfx=useSfx();
  const {cvs,burst,rain}=useConfetti();
  const glowTimer=useRef(null);
  const scoreRef=useRef(0);
  const startHighRef=useRef(0);
  const idRef=useRef(0);
  const spawnTimer=useRef(null);
  const scoldedRef=useRef(false);

  useEffect(()=>{
    try{const v=parseInt(localStorage.getItem("moyo_hs")||"0",10);if(!isNaN(v))setHighScore(v);}catch(e){}
  },[]);

  // balloon spawner — spawns faster & balloons rise faster as score climbs
  useEffect(()=>{
    if(phase!=="celebrate")return;
    let alive=true;
    startHighRef.current=highScore;
    scoldedRef.current=false;
    const colors=["#ff4d6d","#5ad1ff","#ffd23f","#b14aff","#7ed957","#ff8fab","#3fd0c9"];
    const spawn=()=>{
      if(!alive)return;
      const s=scoreRef.current;
      const id=++idRef.current;
      const dur=Math.max(2.4, 6.8 - s*0.16);
      const size=44+Math.random()*24;
      const x=5+Math.random()*84;
      const color=colors[Math.floor(Math.random()*colors.length)];
      setBalloons(b=>[...b,{id,x,color,size,dur}]);
      const delay=Math.max(340, 1350 - s*46);
      spawnTimer.current=setTimeout(spawn,delay);
    };
    spawn();
    return()=>{alive=false;clearTimeout(spawnTimer.current);setBalloons([]);};
  },[phase]);

  const missBalloon=(id)=>{
    setBalloons(b=>b.filter(x=>x.id!==id));
    // scold once, but only after she's already popped at least one
    if(scoreRef.current>=1 && !scoldedRef.current){
      scoldedRef.current=true;
      setScold(true);
      sfx.angryBlast();
      setShake(true);setTimeout(()=>setShake(false),500);
      setTimeout(()=>setScold(false),2000);
    }
  };

  const popBalloon=(id,e)=>{
    sfx.pop();
    const r=e.currentTarget.getBoundingClientRect();
    burst(r.left+r.width/2, r.top+r.height/2, 26);
    setBalloons(b=>b.filter(x=>x.id!==id));
    const ns=scoreRef.current+1;scoreRef.current=ns;setScore(ns);
    if(ns>startHighRef.current){
      if(ns===startHighRef.current+1){setNewHigh(true);sfx.ding();}
      setHighScore(ns);
      try{localStorage.setItem("moyo_hs",String(ns));}catch(e){}
    }
  };

  const tapChest=()=>{
    if(phase!=="intro")return;
    sfx.unlock();sfx.rattle();
    setRattling(true);
    setTimeout(()=>setRattling(false),400);
    setTimeout(()=>setPhase("question"),320);
  };

  const pick=(opt)=>{
    if(phase!=="question")return;
    if(!opt.ok){
      sfx.wrong();setAngry(true);setRattling(true);
      setTimeout(()=>setRattling(false),400);
      setTimeout(()=>setAngry(false),1700);
      return;
    }
    setAngry(false);
    setPhase("charging");
    sfx.charge();
    let g=0;
    glowTimer.current=setInterval(()=>{g=Math.min(1,g+0.08);setGlow(g);},90);
    setTimeout(()=>{
      clearInterval(glowTimer.current);
      explode();
    },1550);
  };

  const explode=()=>{
    sfx.boom();
    setFlash(true);setShake(true);
    setPhase("exploded");
    burst(innerWidth/2, innerHeight*0.5);
    setTimeout(()=>setShake(false),500);
    setTimeout(()=>setFlash(false),560);
    setTimeout(()=>{
      setPhase("celebrate");
      rain(true);
      sfx.fanfare();
    },520);
  };

  const replay=()=>{
    rain(false);setGlow(0);setAngry(false);setFlash(false);
    scoreRef.current=0;setScore(0);setNewHigh(false);setBalloons([]);setScold(false);
    scoldedRef.current=false;
    setPhase("intro");
  };

  const chestClass="chest-inner "+(phase==="charging"?"chest-anim-charge":rattling?"chest-anim-rattle":phase==="intro"?"chest-anim-bob":"");

  return(
    <div className={"stage"+(shake?" shake":"")}>
      <div className="sky" aria-hidden="true">
        {Array.from({length:26}).map((_,i)=>(
          <span key={i} className="star" style={{left:Math.random()*100+"%",top:Math.random()*70+"%","--tw":(2+Math.random()*3)+"s",animationDelay:Math.random()*3+"s"}}/>
        ))}
      </div>

      {phase!=="celebrate" && <div className="floorglow" style={{opacity:phase==="charging"?1:0.6}} aria-hidden="true"/>}

      {phase!=="celebrate" && phase!=="exploded" && (
        <div className="center">
          {phase==="question" && (
            <div className="bubble-wrap">
              <div className={"bubble"+(angry?" angry":"")} key={angry?"a":"q"}>
                <div className="q">{angry?"FUCK OFF 🖕":"WHO ARE YOU?"}</div>
              </div>
            </div>
          )}

          <button className="chest-btn" onClick={tapChest} aria-label={phase==="intro"?"Tap the treasure chest":"Treasure chest"} style={{cursor:phase==="intro"?"pointer":"default"}}>
            <div className={chestClass}>
              <Chest glow={phase==="charging"?glow:0}/>
            </div>
          </button>

          {phase==="intro" && <div className="hint">✦ tap the chest ✦</div>}

          {phase==="question" && (
            <div className="options">
              {OPTIONS.map((o,i)=>(
                <button key={i} className={"opt"+(o.ok?"":" dud")} onClick={()=>pick(o)}>{o.t}</button>
              ))}
            </div>
          )}
        </div>
      )}

      <div className={"flash"+(flash?" go":"")} aria-hidden="true"/>

      <canvas id="confetti" ref={cvs} aria-hidden="true"/>

      {phase==="celebrate" && (
        <div className="celebrate show" style={{backgroundImage:`url(${IMG})`}}>
          <div className="hud">
            <span className="pill">Score <b>{score}</b></span>
            <span className="pill">Best <b>{highScore}</b></span>
          </div>
          {newHigh && <div className="newhigh">★ NEW HIGH SCORE ★</div>}
          <div className="gamehint">pop the balloons! 🎈</div>
          {scold && <div className="scold"><span>I SAID POP<br/>THE BALLOONS!!</span></div>}

          {balloons.map(bl=>(
            <button key={bl.id} className="balloon" aria-label="Pop balloon"
              style={{left:bl.x+"%",width:bl.size+"px",animationDuration:bl.dur+"s"}}
              onClick={(e)=>popBalloon(bl.id,e)}
              onAnimationEnd={()=>missBalloon(bl.id)}>
              <svg viewBox="0 0 60 90" width="100%" style={{display:"block"}}>
                <ellipse cx="30" cy="34" rx="26" ry="32" fill={bl.color}/>
                <ellipse cx="22" cy="24" rx="7" ry="10" fill="#fff" opacity=".35"/>
                <path d="M30 66 l-4 6 h8 z" fill={bl.color}/>
                <path d="M30 72 q6 14 -3 26" stroke="#ffffff" strokeWidth="1.4" fill="none" opacity=".6"/>
              </svg>
            </button>
          ))}

          <div className="festive">
            <Cake/>
            <div className="hb">
              <span className="l1">HAPPY BIRTHDAY</span>
              <span className="l2">{NAME.toUpperCase()}</span>
            </div>
            <button className="replay" onClick={replay}>↺ open it again</button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
